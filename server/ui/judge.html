<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Dashboard - JusticeEngine-01</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
        }
        .dashboard-main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .escalated-card {
            background: var(--bg-panel);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--accent-danger);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .escalated-card h3 {
            color: var(--accent-danger);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        .escalation-reason {
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-left: 3px solid var(--accent-danger);
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .case-summary, .ai-summary {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="logo-container" style="flex-direction:row; gap:1rem; padding:0; border:none;">
            <span class="emoji" style="font-size:2rem; margin:0;">🧑‍⚖️</span>
            <div>
                <h1 style="font-size:1.5rem;">Human Judge Dashboard</h1>
                <p class="subtitle">Escalated Cases Review</p>
            </div>
        </div>
        <a href="/" class="btn secondary-btn">Back to Portal</a>
    </header>

    <main class="dashboard-main">
        <h2>Cases Pending Review (<span id="pending-count">0</span>)</h2>
        <p class="subtitle mb-3" style="margin-bottom:2rem;">The following cases were triaged by JusticeEngine-01 but escalated by the user.</p>

        <div id="escalated-list">
            <div class="loading-spinner">Loading escalated cases...</div>
        </div>
    </main>

    <script src="/judge.js"></script>
</body>
</html>
